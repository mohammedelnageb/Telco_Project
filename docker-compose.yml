services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: telecom_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telecom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telecom_password}
      POSTGRES_DB: ${POSTGRES_DB:-telecom_monitoring}
    # Avoid binding DB ports externally to protect data layer; only accessible from db_network.
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telecom_user} -d ${POSTGRES_DB:-telecom_monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_network
    # Postgres must write to /var/lib/postgresql/data and /var/run/postgresql during init/runtime.
    # Keep filesystem writable for this service to avoid startup permission errors.
    security_opt:
      - no-new-privileges:true

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_USER: ${POSTGRES_USER:-telecom_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-telecom_password}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-telecom_monitoring}
      PORT: 5000
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telecom_network
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Frontend Dashboard Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_API_URL: http://nginx
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - telecom_network
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Nginx load balancer for frontend
  nginx:
    image: nginx:stable-alpine
    container_name: telecom_nginx
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - telecom_network
    restart: unless-stopped

# Scale backend replicas for load-balancing tests:
# docker compose up -d --scale backend=3

  # Data Updater Service
  data-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: telecom_data_updater
    environment:
      DB_USER: ${POSTGRES_USER:-telecom_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-telecom_password}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-telecom_monitoring}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_network
    # Run simulation continuously
    command: ["--action", "simulate", "--duration", "3600"]
    restart: unless-stopped

networks:
  telecom_network:
    driver: bridge
  db_network:
    driver: bridge

volumes:
  postgres_data:
